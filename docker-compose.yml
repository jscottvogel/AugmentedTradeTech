version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: augmentedtradetech-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: augmentedtradetech
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
